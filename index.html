<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Always Last Season – Fantasy League 95/96</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --green-dark: #009624;
    --amber: #ffab00;
    --red: #d50000;
    --navy: #0a0e1a;
    --navy2: #111827;
    --navy3: #1a2235;
    --card: #151d2e;
    --border: rgba(255,255,255,0.07);
    --text: #e8ecf0;
    --muted: #7a8a9a;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 80px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    padding: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #0a0e1a 0%, #0d2040 50%, #0a1628 100%);
    border-bottom: 3px solid var(--green);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 24px 36px;
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-block;
    background: var(--green);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 4px 10px;
    margin-bottom: 16px;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 40px rgba(0,200,83,0.3);
  }

  h1 span { color: var(--green); display: block; }
  .header-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 4px; color: var(--muted); margin-top: 12px; text-transform: uppercase; }

  .pitch-deco { position: absolute; right: -40px; top: 50%; transform: translateY(-50%); width: 300px; height: 300px; border: 1px solid rgba(0,200,83,0.15); border-radius: 50%; opacity: 0.5; }

  .tabs { background: var(--navy2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
  .tabs-inner { max-width: 1200px; margin: 0 auto; display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 24px; }
  .tab { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 16px 20px; cursor: pointer; border-bottom: 3px solid transparent; background: none; border-top: none; border-left: none; border-right: none; transition: all 0.2s; white-space: nowrap; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; margin-bottom: 8px; color: #fff; }
  .section-desc { color: var(--muted); font-size: 14px; margin-bottom: 32px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; }

  /* STANDINGS */
  .standings-table { width: 100%; border-collapse: collapse; font-family: 'Barlow Condensed', sans-serif; }
  .standings-table th { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .standings-table td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 15px; }
  .pos-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); width: 40px; }
  .manager-name { font-weight: 700; color: #fff; }
  .team-name { font-size: 12px; color: var(--muted); }

  .budget-bar-wrap { display: flex; align-items: center; gap: 10px; }
  .budget-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .budget-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--amber)); }
  .budget-val { font-size: 13px; color: var(--green); font-weight: 700; min-width: 42px; text-align: right; }

  /* CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
  .manager-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .card-manager { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #fff; }
  .card-body { padding: 16px 20px; }
  .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-item label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .stat-item value { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #fff; }

  .players-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .squad-pos-group { margin-bottom: 12px; width: 100%; display: flex; flex-wrap: wrap; gap: 6px; }
  .player-chip { font-size: 11px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; padding: 4px 8px; border-radius: 3px; border: 1px solid var(--border); color: var(--text); background: rgba(255,255,255,0.04); }
  .chip-pos { font-size: 9px; color: var(--muted); margin-right: 3px; }

  /* BIDS & POOL */
  .won-tag { background: rgba(0,200,83,0.15); color: var(--green); border: 1px solid rgba(0,200,83,0.3); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 2px; }
  .pos-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; }
  .pos-GK { background: rgba(100,180,255,0.15); color: #64b4ff; }
  .pos-DEF { background: rgba(0,200,83,0.12); color: var(--green); }
  .pos-MID { background: rgba(255,171,0,0.12); color: var(--amber); }
  .pos-ST { background: rgba(213,0,0,0.15); color: #ff5252; }

  .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .pool-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
  .pool-player-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: #fff; }
  .pool-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }

  .search-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .search-input, .filter-select { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; color: var(--text); outline: none; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--navy2); border: 1px solid rgba(0,200,83,0.2); border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .modal-body { padding: 24px; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }

  /* REVIEWS & REPORTS */
  .review-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
  .review-header { padding: 20px 24px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }
  .review-body { padding: 24px; }
  .verdict-badge { padding: 4px 12px; border-radius: 4px; font-weight: 700; font-size: 12px; text-transform: uppercase; }
  .verdict-genius { background: rgba(0,200,83,0.15); color: var(--green); }
  .verdict-solid { background: rgba(100,180,255,0.15); color: #64b4ff; }

  .holding-screen { text-align: center; padding: 60px 24px; }
  .countdown-item { background: var(--card); padding: 16px; border-radius: 8px; min-width: 80px; }
  .countdown-num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--green); }

  footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--muted); font-size: 12px; }

  @media (max-width: 640px) { .cards-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="badge">⚽ Fantasy League</div>
    <h1>Always<span>Last Season</span></h1>
    <p class="header-sub">the retro fantasy football game</p>
  </div>
  <div class="pitch-deco"></div>
</header>

<nav class="tabs">
  <div class="tabs-inner">
    <button class="tab active" onclick="showTab('overview')">Overview</button>
    <button class="tab" onclick="showTab('standings')">Standings</button>
    <button class="tab" onclick="showTab('squads')">Squads</button>
    <button class="tab" onclick="showTab('bids')">Bid Results</button>
    <button class="tab" onclick="showTab('pool')">Player Pool</button>
    <button class="tab" onclick="showTab('reviews')">Squad Reviews</button>
    <button class="tab" onclick="showTab('reports')">Match Reports</button>
  </div>
</nav>

<main>
  <section id="overview" class="section active">
    <div class="section-title">League Overview</div>
    <div class="cards-grid" id="overview-cards"></div>
  </section>

  <section id="standings" class="section">
    <div class="section-title">Manager Standings</div>
    <table class="standings-table">
      <thead><tr><th>#</th><th>Manager / Team</th><th>Players</th><th>Spent</th><th>Remaining</th><th>Rating</th></tr></thead>
      <tbody id="standings-body"></tbody>
    </table>
  </section>

  <section id="squads" class="section">
    <div class="section-title">Squad Viewer</div>
    <div class="search-bar">
      <input class="search-input" type="text" placeholder="Search..." id="squad-search" oninput="filterSquads()">
      <select class="filter-select" id="squad-filter" onchange="filterSquads()"><option value="">All Managers</option></select>
    </div>
    <div class="cards-grid" id="squads-grid"></div>
  </section>

  <section id="bids" class="section">
    <div class="section-title">Bid Results</div>
    <table class="standings-table">
      <tbody id="bids-body-r2"></tbody>
      <tbody id="bids-body"></tbody>
    </table>
  </section>

  <section id="pool" class="section">
    <div class="section-title">Player Pool</div>
    <div class="pool-grid" id="pool-grid"></div>
  </section>

  <section id="reviews" class="section">
    <div class="section-title">Squad Reviews</div>
    <div id="reviews-container"></div>
  </section>

  <section id="reports" class="section">
    <div class="holding-screen">
      <div class="countdown-num">38</div>
      <div class="section-desc">Gameweeks Remaining</div>
    </div>
  </section>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-name"></div>
        <div class="modal-subtitle" id="modal-team" style="color:var(--green)"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-players-title" style="font-size:11px; text-transform:uppercase; color:var(--muted); margin-bottom:10px;">Signed Players</div>
      <div id="modal-squad"></div>
      <div class="modal-analysis" id="modal-analysis" style="margin-top:20px; padding:15px; background:rgba(0,200,83,0.05); border-radius:8px; font-size:13px; line-height:1.6;"></div>
    </div>
  </div>
</div>

<script>
// DATA
const managers = [
  { id: 'rowe', name: 'Rowe', fullname: "Autoglass Trophy 1992", manager: 'Rowe', players: 14, spent: 39.4, remaining: 0.6, rating: 'S', analysis: "Stormed Round 2 with 7 more wins. Balance is key here.", squad: [{name:'Matt Le Tissier',pos:'ST',club:'Southampton'},{name:'Ryan Giggs',pos:'MF',club:'Man Utd'},{name:'Ruud Gullit',pos:'MF',club:'Chelsea'},{name:'Tony Yeboah',pos:'ST',club:'Leeds'},{name:'Robbie Earle',pos:'MF',club:'Wimbledon'},{name:'Julian Dicks',pos:'DF',club:'West Ham'},{name:'Lucas Radebe',pos:'DF',club:'Leeds'},{name:'Alan Wright',pos:'DF',club:'Aston Villa'},{name:'Dominic Matteo',pos:'MF',club:'Liverpool'},{name:'Gordon Strachan',pos:'MF',club:'Coventry'},{name:'Henning Berg',pos:'DF',club:'Blackburn'},{name:'John Lukic',pos:'GK',club:'Leeds'},{name:'Mark Stein',pos:'ST',club:'Chelsea'},{name:'Rob Lee',pos:'MF',club:'Newcastle'}] },
  { id: 'holt', name: 'Holt', fullname: "Kalima Shakhtar D", manager: 'Holt', players: 14, spent: 31.1, remaining: 8.9, rating: 'S', analysis: "The master of the £0 bid. 14 players for 31m is incredible.", squad: [{name:'Tim Flowers',pos:'GK',club:'Blackburn'},{name:'Gareth Southgate',pos:'DF',club:'Aston Villa'},{name:'Steve Staunton',pos:'DF',club:'Aston Villa'},{name:'Philippe Albert',pos:'DF',club:'Newcastle'},{name:'Jason McAteer',pos:'DF',club:'Liverpool'},{name:'Chris Armstrong',pos:'ST',club:'Tottenham'},{name:'Øyvind Leonhardsen',pos:'MF',club:'Wimbledon'},{name:'Ruel Fox',pos:'MF',club:'Tottenham'},{name:'Steve Stone',pos:'MF',club:'Nottm Forest'},{name:'Andy Townsend',pos:'MF',club:'Aston Villa'},{name:'Dean Holdsworth',pos:'ST',club:'Wimbledon'},{name:'Des Lyttle',pos:'DF',club:'Nottm Forest'},{name:'Gary Charles',pos:'DF',club:'Aston Villa'},{name:'Ian Walker',pos:'GK',club:'Tottenham'}] },
  { id: 'cotton', name: 'Cotton', fullname: "Real SoSoBad", manager: 'Cotton', players: 11, spent: 35.5, remaining: 4.5, rating: 'A', analysis: "Already locked in the elite core. Cruising.", squad: [{name:'Roy Keane',pos:'MF',club:'Man Utd'},{name:'Denis Irwin',pos:'DF',club:'Man Utd'},{name:'Paul Scholes',pos:'MF',club:'Man Utd'},{name:'Gary Neville',pos:'DF',club:'Man Utd'},{name:'Eric Cantona',pos:'ST',club:'Man Utd'},{name:'Tony Adams',pos:'DF',club:'Arsenal'},{name:'Ugo Ehiogu',pos:'DF',club:'Aston Villa'},{name:'Teddy Sheringham',pos:'ST',club:'Tottenham'},{name:'Gary McAllister',pos:'MF',club:'Leeds'},{name:'Nicky Butt',pos:'MF',club:'Man Utd'},{name:'Keith Gillespie',pos:'MF',club:'Newcastle'}] }
];

const posOrder = { 'GK': 1, 'DF': 2, 'MF': 3, 'ST': 4 };

function posTag(p) {
  return `<span class="pos-tag pos-${p}">${p}</span>`;
}

function ratingBadge(r) {
  const cls = {S:'rating-s',A:'rating-a',B:'rating-b',C:'rating-c'}[r] || 'rating-c';
  return `<span class="verdict-badge verdict-${cls}">${r}</span>`;
}

// SHARED SORTING & GROUPING LOGIC
function getGroupedSquadHtml(squad) {
  const sorted = [...squad].sort((a, b) => posOrder[a.pos] - posOrder[b.pos]);
  const groups = sorted.reduce((acc, p) => {
    if (!acc[p.pos]) acc[p.pos] = [];
    acc[p.pos].push(p);
    return acc;
  }, {});
  
  return Object.keys(groups).sort((a, b) => posOrder[a] - posOrder[b]).map(pos => `
    <div class="squad-pos-group">
      ${groups[pos].map(p => `<span class="player-chip"><span class="chip-pos">${p.pos}</span>${p.name}</span>`).join('')}
    </div>
  `).join('');
}

function openModal(m) {
  document.getElementById('modal-name').textContent = m.fullname;
  document.getElementById('modal-team').textContent = m.manager;
  document.getElementById('modal-analysis').innerHTML = m.analysis;
  document.getElementById('modal-squad').innerHTML = getGroupedSquadHtml(m.squad);
  document.getElementById('modal-overlay').classList.add('open');
}

function renderSquadCards(list) {
  const grid = document.getElementById('squads-grid');
  grid.innerHTML = '';
  list.forEach(m => {
    const card = document.createElement('div');
    card.className = 'manager-card';
    card.onclick = () => openModal(m);
    card.innerHTML = `
      <div class="card-header"><div><div class="card-manager">${m.fullname}</div></div>${ratingBadge(m.rating)}</div>
      <div class="card-body">
        <div class="players-list" style="display:block;">${getGroupedSquadHtml(m.squad)}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModal(e) { if (e.target.id === 'modal-overlay') closeModalDirect(); }

// INIT
renderSquadCards(managers);
</script>
</body>
</html>
